<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>Forge — Workout Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"></div>

<nav id="tabbar" class="tabbar">
  <button class="tab-btn active" data-view="today">
    <span class="tab-icon">🏋️</span><span>Today</span>
  </button>
  <button class="tab-btn" data-view="history">
    <span class="tab-icon">📅</span><span>History</span>
  </button>
  <button class="tab-btn" data-view="profile">
    <span class="tab-icon">👤</span><span>Profile</span>
  </button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
